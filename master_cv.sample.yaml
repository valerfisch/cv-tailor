# Cover letter configuration — defines thesis framing angles and highlight blocks
# shown during the interactive cover letter generation flow.
cover_letter:
  # How to frame your thesis/research work for different role types
  thesis_angles:
  - label: "ML/AI focus (model architectures, custom losses, training)"
    value: ml_research
  - label: "Production focus (deployment, pipeline engineering, integration)"
    value: production
  - label: "Process optimization (automating workflows, reducing manual steps)"
    value: process_optimization
  - label: "Data focus (dataset transformation, evaluation, analysis)"
    value: data

  # Highlight blocks — specific achievements to weave into cover letters.
  # Each block has an id (used internally), a label (shown in the CLI),
  # and keywords (for auto-selecting relevant blocks based on posting analysis).
  highlight_blocks:
  - id: model_compression
    label: "Model compression (size reduction while maintaining performance)"
    keywords: ["compression", "pruning", "distillation", "quantization", "optimization",
               "model size", "edge", "mobile", "efficient", "lightweight"]
  - id: ablation_doe
    label: "Ablation studies / strict DOE methodology"
    keywords: ["ablation", "experiment", "doe", "design of experiments", "benchmark",
               "evaluation", "systematic", "methodology"]
  - id: data_transformation
    label: "Legacy data transformation (raw to ML-ready datasets)"
    keywords: ["data pipeline", "data processing", "etl", "data engineering",
               "data cleaning", "preprocessing", "legacy", "data transformation"]
  - id: cloud_deployment
    label: "Cloud deployment / containerized inference endpoint"
    keywords: ["cloud", "gcp", "azure", "deploy", "inference", "endpoint",
               "kubernetes", "docker"]
  - id: stakeholder_communication
    label: "Stakeholder communication (explaining complex AI to non-technical audiences)"
    keywords: ["stakeholder", "present", "communicate", "collaborate", "leadership",
               "cross-team", "explain"]